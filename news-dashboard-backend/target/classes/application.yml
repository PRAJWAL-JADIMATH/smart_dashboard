spring:
  application:
    name: news-dashboard
  
  # Database Configuration (H2 In-Memory for Zero-Config Running)
  datasource:
    url: jdbc:h2:mem:news_dashboard;DB_CLOSE_DELAY=-1
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  # Hibernate/JPA Configuration
  jpa:
    hibernate:
      ddl-auto: update # Automatically creates/updates tables based on our entity classes
    show-sql: true # Helpful for debugging queries
    properties:
      hibernate:
        format_sql: true

  # Email Configuration
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USER:your_email@gmail.com}
    password: ${EMAIL_PASS:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Our Custom Properties
app:
  newsapi:
    key: ${NEWS_API_KEY} # We will inject this via environment variables
    base-url: https://newsapi.org/v2
  openai:
    key: ${OPENAI_API_KEY}

server:
  port: 8080 # Backend will run on http://localhost:8080
